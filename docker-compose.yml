services:
  alpha-claw-web-site:
    build: .
    container_name: alpha-claw-web-site
    ports:
      - "8787:8080"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=8080
      - HEARTBEAT_JSONL=/data/heartbeat-runs.jsonl
    volumes:
      - /Users/openclaw/.openclaw/workspace/state/heartbeat-runs.jsonl:/data/heartbeat-runs.jsonl:ro

  cloudflared-alpha:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-alpha-claw-web-site
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    restart: unless-stopped
    depends_on:
      - alpha-claw-web-site
    volumes:
      - ./cloudflared-config.yml:/etc/cloudflared/config.yml:ro
      - /Users/openclaw/.cloudflared/19a93ee7-94c6-41f1-907d-4ba05568694d.json:/etc/cloudflared/creds.json:ro
